name: MLOps CI/CD Pipeline

# Trigger on every push to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint and Test
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx

      - name: Run flake8 linting
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=venv,__pycache__,.git,model/artifacts

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2 — Build and Push Docker Image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test   # only run if lint and test passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlops-inference:latest
            ${{ secrets.DOCKER_USERNAME }}/mlops-inference:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy to AWS EC2
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push   # only run after image is pushed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Write SSH key to temp file
          echo "$EC2_SSH_KEY" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem ${EC2_USER}@${EC2_HOST} << REMOTE
            echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin

            docker pull ${DOCKER_USERNAME}/mlops-inference:${IMAGE_TAG}

            docker stop mlops-pipeline 2>/dev/null || true
            docker rm   mlops-pipeline 2>/dev/null || true

            docker run -d \
              --name mlops-pipeline \
              --restart unless-stopped \
              -p 8000:8000 \
              -e MODEL_DIR=model/artifacts \
              -e LABEL_COL=label \
              -e SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL}" \
              -v /home/ubuntu/data:/app/data \
              ${DOCKER_USERNAME}/mlops-inference:${IMAGE_TAG}

            echo "Container started."
            docker ps --filter "name=mlops-pipeline"
          REMOTE

          rm -f /tmp/ec2_key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "http://${EC2_HOST}:8000/health")
          if [ "$HEALTH" == "200" ]; then
            echo "Deployment successful — /health returned 200"
          else
            echo "Deployment failed — /health returned $HEALTH"
            exit 1
          fi