global:
  resolve_timeout: 5m
  # Default Slack config applied to all routes unless overridden
  slack_api_url: SLACK_WEBHOOK_URL

route:
  # Default receiver for all alerts
  receiver: slack_notifications
  group_by: ["alertname", "severity"]
  group_wait: 10s        # wait before sending first alert in a group
  group_interval: 5m     # wait before sending updated alerts
  repeat_interval: 1h    # resend if alert is still firing after 1 hour

  # Route critical alerts immediately with no grouping delay
  routes:
    - match:
        severity: critical
      receiver: slack_critical
      group_wait: 0s
      repeat_interval: 15m

receivers:
  # General notifications channel
  - name: slack_notifications
    slack_configs:
      - channel: "#mlops-alerts"
        send_resolved: true
        title: ":bell: MLOps Alert — {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  # Critical alerts — separate channel or same with urgent formatting
  - name: slack_critical
    slack_configs:
      - channel: "#mlops-alerts"
        send_resolved: true
        title: ":rotating_light: CRITICAL — {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # Suppress warning alerts if a critical alert is already firing for the same issue
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]