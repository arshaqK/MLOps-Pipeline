global:
  resolve_timeout: 5m

route:
  receiver: slack_notifications
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: slack_critical
      group_wait: 0s
      repeat_interval: 15m

receivers:
  - name: slack_notifications
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_webhook.txt
        channel: "#mlops-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: slack_critical
    slack_configs:
      - api_url_file: /etc/alertmanager/slack_webhook.txt
        channel: "#mlops-alerts"
        send_resolved: true
        title: ":rotating_light: [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
        
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]